<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="robots" content="noindex"><title>Upzon Admin — Sign in</title><link rel="stylesheet" href="admin.css"></head>
<body class="admin-login-page">
  <main class="login-shell">
    <a class="admin-brand" href="../index.html"><span class="admin-mark"></span><span>Upzon</span></a>
    <section class="login-card" aria-labelledby="login-heading">
      <p class="admin-kicker">Content control</p><h1 id="login-heading">Welcome back.</h1><p>Sign in to update the Upzon website.</p>
      <form id="login-form"><label>Email<input type="email" name="email" autocomplete="email" required placeholder="you@company.com"></label><label>Password<input type="password" name="password" autocomplete="current-password" required placeholder="Enter password"></label><button type="submit">Sign in <span>→</span></button><p id="login-status" class="admin-status" role="status"></p></form>
      <aside><strong>Frontend demo</strong><span>Use any valid email and the demo password <code>upzon-demo</code>. Replace this check with server-side authentication before deployment.</span></aside>
    </section>
    <p class="login-footer"><a href="../index.html">← Return to website</a></p>
  </main>
  <script src="../script.js"></script><script src="admin.js"></script>
</body></html>
